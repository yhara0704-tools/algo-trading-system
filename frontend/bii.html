<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <title>ALGO TERMINAL — Daily Report</title>
  <script src="/static/js/lightweight-charts.standalone.production.js"></script>
  <style>
    :root {
      --bg:        #0a0e0a;
      --bg-panel:  #0d1410;
      --bg-border: #1a2e1a;
      --green:     #00ff41;
      --green-dim: #00cc33;
      --green-lo:  #005510;
      --red:       #ff3333;
      --yellow:    #ffcc00;
      --gray:      #4a6a4a;
      --text:      #c0e0c0;
      --text-dim:  #6a9a6a;
      --font:      'Courier New', 'Lucida Console', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      width: 1200px;
      padding: 0;
      position: relative;
    }

    /* CRT scanline */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.10) 2px, rgba(0,0,0,0.10) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ── Header ── */
    #header {
      background: #050905;
      border-bottom: 1px solid var(--bg-border);
      padding: 0 20px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #logo {
      color: var(--green);
      font-size: 15px;
      font-weight: bold;
      letter-spacing: 3px;
      text-shadow: 0 0 8px var(--green);
    }
    #phase-badge {
      padding: 2px 10px;
      font-size: 10px;
      letter-spacing: 2px;
      border-radius: 2px;
    }
    .phase-backtest { background: #0d1f0d; color: #44cc66; border: 1px solid #1a3a1a; }
    .phase-paper    { background: #0d0d1f; color: #6688ff; border: 1px solid #1a1a3a; }
    .phase-live     { background: #1f0d0d; color: #ff6644; border: 1px solid #3a1a1a; }
    #header-right { font-size: 11px; color: var(--gray); text-align: right; line-height: 1.6; }

    /* ── Stats row ── */
    #stats {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      border-bottom: 1px solid var(--bg-border);
    }
    .stat-cell {
      padding: 14px 18px;
      border-right: 1px solid var(--bg-border);
    }
    .stat-cell:last-child { border-right: none; }
    .stat-label {
      font-size: 9px;
      color: var(--gray);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .stat-value {
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 1px;
    }
    .pos { color: var(--green); text-shadow: 0 0 6px rgba(0,255,65,0.4); }
    .neg { color: var(--red);   text-shadow: 0 0 6px rgba(255,51,51,0.4); }
    .neu { color: var(--text); }
    .stat-unit { font-size: 10px; color: var(--gray); margin-left: 3px; }

    /* ── Chart section ── */
    #chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px 8px;
      border-bottom: 1px solid var(--bg-border);
      background: #080c08;
    }
    #chart-title {
      font-size: 11px;
      color: var(--green-dim);
      letter-spacing: 2px;
    }
    #chart-meta { font-size: 10px; color: #2a4a2a; letter-spacing: 1px; }

    #chart-container {
      width: 1200px;
      height: 400px;
      background: var(--bg);
      position: relative;
    }

    /* ── Legend + Footer ── */
    #bottom {
      border-top: 1px solid var(--bg-border);
      background: #080c08;
      padding: 8px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #legend { display: flex; gap: 20px; font-size: 10px; color: var(--gray); }
    #legend span { display: flex; align-items: center; gap: 5px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
    .dot-entry { background: var(--green); box-shadow: 0 0 4px var(--green); }
    .dot-exit-win  { background: var(--green); }
    .dot-exit-loss { background: var(--red); }
    #footer-right { font-size: 10px; color: #2a4a2a; letter-spacing: 1px; }

    /* ── Loading ── */
    #loading {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: var(--gray); letter-spacing: 4px;
    }
  </style>
</head>
<body>

<div id="loading">INITIALIZING...</div>

<div id="main" style="display:none">
  <div id="header">
    <div id="logo">⚗ ALGO TERMINAL
      <span id="phase-badge" class="phase-backtest">BACKTEST</span>
    </div>
    <div id="header-right">
      <div id="report-date">—</div>
      <div>Japan Equity Market</div>
    </div>
  </div>

  <div id="stats">
    <div class="stat-cell">
      <div class="stat-label">Today P&amp;L</div>
      <div class="stat-value neu" id="pnl-today">—<span class="stat-unit">JPY</span></div>
    </div>
    <div class="stat-cell">
      <div class="stat-label">Cumulative P&amp;L</div>
      <div class="stat-value neu" id="pnl-cum">—<span class="stat-unit">JPY</span></div>
    </div>
    <div class="stat-cell">
      <div class="stat-label">Trades</div>
      <div class="stat-value neu" id="trades">—</div>
    </div>
    <div class="stat-cell">
      <div class="stat-label">Win Rate</div>
      <div class="stat-value neu" id="win-rate">—</div>
    </div>
    <div class="stat-cell">
      <div class="stat-label">Symbol</div>
      <div class="stat-value neu" style="font-size:18px" id="symbol-label">—</div>
    </div>
  </div>

  <div id="chart-header">
    <div id="chart-title">PRICE CHART — <span id="chart-symbol">銘柄A</span> / <span id="chart-interval">5m</span></div>
    <div id="chart-meta">Price scale &amp; dates hidden for publication</div>
  </div>
  <div id="chart-container"></div>

  <div id="bottom">
    <div id="legend">
      <span><span class="dot dot-entry"></span>Entry</span>
      <span><span class="dot dot-exit-win"></span>Exit (win)</span>
      <span><span class="dot dot-exit-loss"></span>Exit (loss)</span>
    </div>
    <div id="footer-right">AI TRADING RESEARCH — NOT FINANCIAL ADVICE &nbsp;|&nbsp; <span id="footer-date">—</span></div>
  </div>
</div>

<script>
const fmtJpy = v => {
  const n = Math.round(v);
  return (n >= 0 ? '+' : '') + n.toLocaleString('ja-JP');
};

async function init() {
  const [sumRes, chartRes] = await Promise.all([
    fetch('/api/bii/summary'),
    fetch('/api/bii/chart'),
  ]);
  const sum   = await sumRes.json();
  const chart = await chartRes.json();

  // ── Stats ──
  const pnlT = sum.pnl_today_jpy ?? 0;
  const pnlC = sum.pnl_cumulative_jpy ?? 0;
  const tc   = sum.trade_count ?? 0;
  const wc   = sum.win_count ?? 0;
  const wr   = tc > 0 ? Math.round(wc / tc * 100) : 0;

  document.getElementById('report-date').textContent = sum.date ?? '—';
  document.getElementById('footer-date').textContent  = sum.date ?? '—';

  const pnlTEl = document.getElementById('pnl-today');
  pnlTEl.innerHTML = fmtJpy(pnlT) + '<span class="stat-unit"> JPY</span>';
  pnlTEl.className = 'stat-value ' + (pnlT > 0 ? 'pos' : pnlT < 0 ? 'neg' : 'neu');

  const pnlCEl = document.getElementById('pnl-cum');
  pnlCEl.innerHTML = fmtJpy(pnlC) + '<span class="stat-unit"> JPY</span>';
  pnlCEl.className = 'stat-value ' + (pnlC > 0 ? 'pos' : pnlC < 0 ? 'neg' : 'neu');

  document.getElementById('trades').textContent   = tc;
  document.getElementById('win-rate').textContent = tc > 0 ? wr + '%' : '—';
  document.getElementById('symbol-label').textContent = chart.symbol_label ?? '—';

  const phase = sum.phase ?? 'backtest';
  const badge = document.getElementById('phase-badge');
  badge.textContent = phase.toUpperCase();
  badge.className = 'phase-' + phase;

  // ── Chart ──
  document.getElementById('chart-symbol').textContent   = chart.symbol_label ?? '銘柄A';
  document.getElementById('chart-interval').textContent = chart.interval ?? '5m';

  const container = document.getElementById('chart-container');
  const lc = LightweightCharts.createChart(container, {
    width:  1200,
    height: 400,
    layout: { background: { color: '#0a0e0a' }, textColor: '#2a4a2a' },
    grid: {
      vertLines: { color: '#0f1f0f' },
      horzLines: { color: '#0f1f0f' },
    },
    crosshair: { mode: LightweightCharts.CrosshairMode.Hidden },
    rightPriceScale: { visible: false },
    leftPriceScale:  { visible: false },
    timeScale: {
      visible: true,
      borderColor: '#1a2e1a',
      tickMarkFormatter: () => '',
    },
    handleScroll: false,
    handleScale:  false,
  });

  const candleSeries = lc.addCandlestickSeries({
    upColor:         '#00aa33',
    downColor:       '#aa2200',
    borderUpColor:   '#00ff41',
    borderDownColor: '#ff3333',
    wickUpColor:     '#00aa33',
    wickDownColor:   '#aa2200',
  });

  if (chart.candles && chart.candles.length > 0) {
    candleSeries.setData(chart.candles);

    const markers = [];
    for (const t of (chart.trades || [])) {
      if (t.entry_bar) {
        markers.push({
          time: t.entry_bar, position: 'belowBar',
          color: '#00ff41', shape: 'arrowUp', text: 'IN',
        });
      }
      if (t.exit_bar) {
        const win = (t.pnl ?? 0) >= 0;
        markers.push({
          time: t.exit_bar, position: 'aboveBar',
          color: win ? '#00ff41' : '#ff3333', shape: 'arrowDown', text: 'OUT',
        });
      }
    }
    markers.sort((a, b) => a.time - b.time);
    candleSeries.setMarkers(markers);
    lc.timeScale().fitContent();
  }

  document.getElementById('loading').style.display = 'none';
  document.getElementById('main').style.display = 'block';
}

init().catch(e => {
  document.getElementById('loading').textContent = 'ERROR: ' + e.message;
});
</script>
</body>
</html>
